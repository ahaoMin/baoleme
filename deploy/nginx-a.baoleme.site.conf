# a.baoleme.site — Nginx（HTTP，先通站点；HTTPS 用 certbot 追加）
server {
    listen 80;
    listen [::]:80;
    server_name a.baoleme.site;

    root /var/www/baoleme;
    index index.html;

    # 静态资源长缓存（Vite 带 hash 的 assets）
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 猫meme 等大文件
    location /猫meme/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Hash 路由 SPA：直接回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
